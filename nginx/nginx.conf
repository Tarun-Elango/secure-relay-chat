events {}

http {
  # Define rate limit zone (per IP)
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/s;

  upstream app_backends {
    # change the server addresses and ports to match your backend services
    server secure-relay-chat-copy.railway.internal:8080;
    server secure-relay-chat.railway.internal:8080;
  }

  server {
    listen 80;

    location / {
      # Apply rate limiting
      limit_req zone=api_limit burst=10 nodelay;

      proxy_pass http://app_backends;

      # Standard headers
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # WebSocket support
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";

      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }
  }
}
