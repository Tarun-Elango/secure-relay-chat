events {
    worker_connections 1024;
}

http {
    # Use standard local DNS resolver that docker/Railway provides
    resolver 127.0.0.11 ipv6=on valid=10s;

    server {
        listen 80;
        
        location / {
            # Using variables forces Nginx to re-resolve the DNS constantly
            set $backend "http://function-bun.railway.internal:8080";
            
            # If you want to load balance natively this way, it's harder with variables.
            # You might need to stick to your upstream block and just restart Nginx on backend deploys.
            proxy_pass $backend; 
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
