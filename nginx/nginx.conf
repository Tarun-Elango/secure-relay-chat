events {}

http {
  upstream app_backends {
    # Round-robin by default
    server secure-relay-chat-copy.railway.internal:8080;
    server secure-relay-chat.railway.internal:8080;

    # Or use least_conn for smarter balancing:
    # least_conn;
  }

   server {
    listen 80;

    location / {
      proxy_pass http://app_backends;

      # Standard headers
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # WebSocket upgrade headers ← critical
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";

      # Keep connection alive longer for WS
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }
  }
}